name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Formatting is feature-independent, so it runs once.
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt -- --check

  # Exactly one generator feature must be enabled, so clippy is run once per
  # generator: a bare `cargo clippy` would hit the no-generator compile_error.
  clippy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: [xoroshiro128pp, mixmax, mixmax17, mixmax256, "mixmax17,mixmax-star"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy (${{ matrix.features }})
        run: cargo clippy --all-targets --features ${{ matrix.features }} -- -D warnings

  # Tests, on stable, across every generator. Each generator gates its own code
  # (the MIXMAX bit-exactness vectors in particular), so a single feature would
  # leave the others untested.
  test:
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    strategy:
      matrix:
        features: [xoroshiro128pp, mixmax, mixmax17, mixmax256, "mixmax17,mixmax-star"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Test (${{ matrix.features }})
        run: RUST_BACKTRACE=full cargo test --features ${{ matrix.features }} --verbose
